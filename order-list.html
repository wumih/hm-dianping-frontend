<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>我的订单</title>
  <link rel="stylesheet" href="./css/element.css">
  <style type="text/css">
    body {
      margin: 0;
      background: #f7f8fa;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #ff6a3d 0%, #ff7f50 160px, #f7f8fa 161px, #f7f8fa 100%);
    }
    .header {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .content {
      flex: 1;
      padding: 10px 12px 20px;
      box-sizing: border-box;
      overflow-y: auto;
    }
    .order-card {
      border-radius: 14px;
      padding: 14px 12px;
      margin-bottom: 12px;
      background: #fff;
      box-shadow: 0 6px 18px rgba(255, 102, 51, 0.12);
    }
    .order-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      color: #303133;
      font-size: 13px;
    }
    .order-id {
      width: 72%;
      color: #606266;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .order-status {
      color: #ff6633;
      font-weight: 600;
      font-size: 13px;
    }
    .order-body {
      color: #303133;
      font-size: 14px;
      line-height: 1.8;
      padding: 8px 0;
      border-top: 1px solid #f3f3f4;
      border-bottom: 1px solid #f3f3f4;
    }
    .order-footer {
      display: flex;
      justify-content: flex-end;
      padding-top: 10px;
    }
    .fake-btn {
      border: 1px solid #ff6633;
      color: #ff6633;
      padding: 4px 12px;
      border-radius: 14px;
      font-size: 12px;
      line-height: 18px;
    }
    .empty-box {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #909399;
    }
    .empty-icon {
      width: 78px;
      height: 78px;
      border-radius: 39px;
      background: #fff;
      box-shadow: 0 6px 18px rgba(255, 102, 51, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin-bottom: 10px;
    }
    .loading-wrap {
      text-align: center;
      color: #fff;
      padding-bottom: 6px;
      font-size: 12px;
      height: 20px;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">我的订单</div>
  <div class="loading-wrap" v-if="loading">加载中...</div>
  <div class="content">
    <template v-if="orders.length > 0">
      <div class="order-card" v-for="item in orders" :key="item.id">
        <div class="order-head">
          <div class="order-id">订单号: {{ item.id }}</div>
          <div class="order-status">{{ statusText(item.status) }}</div>
        </div>
        <div class="order-body">
          <div>购买的优惠券 ID: {{ item.voucherId }}</div>
          <div>下单时间: {{ formatDateTime(item.createTime) }}</div>
          <div>支付方式: {{ payTypeText(item.payType) }}</div>
        </div>
        <div class="order-footer">
          <div class="fake-btn">查看详情</div>
        </div>
      </div>
    </template>
    <div class="empty-box" v-else-if="!loading">
      <div class="empty-icon">🧾</div>
      <div>您还未下过单~</div>
    </div>
  </div>
</div>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script>
  new Vue({
    el: "#app",
    data: {
      orders: [],
      current: 1,
      loading: false
    },
    created() {
      this.loadOrders();
    },
    methods: {
      loadOrders() {
        this.loading = true;
        axios.get("/voucher-order/list", {
          params: {
            current: this.current
          }
        })
          .then(({data}) => {
            if (data && data.success === false) {
              this.$message.error(data.errorMsg || "加载订单失败");
              return;
            }
            const list = data && data.data ? data.data : [];
            this.orders = Array.isArray(list) ? list : [];
          })
          .catch((err) => {
            this.$message.error((err && err.message) || "加载订单失败");
          })
          .finally(() => {
            this.loading = false;
          });
      },
      statusText(status) {
        const map = {
          1: "未支付",
          2: "已支付",
          3: "已核销",
          4: "已取消"
        };
        return map[status] || "未知状态";
      },
      payTypeText(payType) {
        const map = {
          1: "余额支付",
          2: "支付宝",
          3: "微信"
        };
        return map[payType] || "未知方式";
      },
      formatDateTime(value) {
        if (!value) {
          return "-";
        }
        return String(value).replace("T", " ");
      }
    }
  });
</script>
</body>
</html>
